alias: "Voice Command: Who Is Override"
description: "Intercepts all who is questions globally and forces them into the LLM pipeline"
mode: single
triggers:
  - trigger: conversation
    command:
      - "who is {query}"
      - "who's {query}"
actions:
  - action: conversation.process
    data:
      text: "who is {{ trigger.slots.query }}"
      agent_id: conversation.custom_ai_local_rag
    response_variable: ai_response
  - set_conversation_response: "{{ ai_response.response.speech.plain.speech }}"