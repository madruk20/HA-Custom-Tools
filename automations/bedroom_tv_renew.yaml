alias: "LG TVs: Renew Dev Mode Sessions"
description: "Pings the LG Developer API on the 1st of every month to reset the 1000-hour countdown."
trigger:
  - platform: time
    at: "12:00:00"
condition:
  - condition: template
    value_template: "{{ now().day == 1 }}"
action:
  - service: rest_command.renew_lg_tv_tokens
mode: single