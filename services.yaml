execute_media:
  name: Execute Media Command
  description: Executes music playback or transport commands.
  fields:
    action:
      name: Action
      description: The media action (play, pause, next, previous).
      required: true
      selector:
        text:
    query:
      name: Query
      description: The song, artist, or album title (for play actions).
      required: false
      selector:
        text:
    room:
      name: Room
      description: Target area name.
      required: false
      selector:
        text:
    device_name:
      name: Device Name
      description: Target device name.
      required: false
      selector:
        text: