# /config/packages/infrastructure.yaml

# ======================================
# TEMPLATES
#=======================================

template:
  - binary_sensor:
      - name: "Bedroom Speaker Available"
        unique_id: bedroom_speaker_available_status
        device_class: connectivity
        state: >
          {% set player = 'media_player.home_assistant_voice_bedroom' %}
          {% set state = states(player) %}
          {% set muted = state_attr(player, 'is_volume_muted') %}
          {% set vol = state_attr(player, 'volume_level') | float(0) %}
          
          {# The logic: It is "On" (Available) only if ALL these are true #}
          {{ state not in ['unavailable', 'unknown', 'off']
             and muted != true
             and vol > 0.01 }}

# ===========================================
# HELPERS (Input Booleans, Texts, DateTimes)
# ===========================================

input_boolean:
  voice_alarm_enabled_bedroom:
    name: "Bedroom Alarm Enabled"
    icon: mdi:alarm
  voice_alarm_enabled_playroom:
    name: "Playroom Alarm Enabled"
    icon: mdi:alarm

input_text:
  active_alarm_media_bedroom:
    name: "Active Alarm Media Bedroom"
    mode: text
    icon: mdi:database
  active_alarm_media_playroom:
    name: "Active Alarm Media Playroom"
    mode: text
    icon: mdi:database
  selected_game:
    name: "Selected Game"
    mode: text
    icon: mdi:controller

input_datetime:
  voice_alarm_bedroom:
    name: "Bedroom Alarm Time"
    has_date: false
    has_time: true
    icon: mdi:clock
  voice_alarm_playroom:
    name: "Playroom Alarm Time"
    has_date: false
    has_time: true
    icon: mdi:clock

