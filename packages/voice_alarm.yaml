automation:
  # ==========================================
  # ALARM ROUTING & ANNOUNCEMENTS
  # ==========================================
  - alias: Voice Alarm Notifications
    description: >-
      Routes alarm announcements, sets dynamic helpers, and includes the Android
      Voice_Alarm failsafe using a dedicated health sensor.
    mode: parallel
    triggers:
      - trigger: time
        at: input_datetime.voice_alarm_bedroom
        id: bedroom_alarm
      - trigger: time
        at: input_datetime.voice_alarm_playroom
        id: playroom_alarm
    conditions: []
    actions:
      - choose:
          - conditions:
              - condition: trigger
                id: bedroom_alarm
              - condition: state
                entity_id: input_boolean.voice_alarm_enabled_bedroom
                state: "on"
            sequence:
              - if:
                  - condition: state
                    entity_id: binary_sensor.bedroom_speaker_available
                    state: "off"
                then:
                  - action: notify.mobile_app_samsung_23
                    data:
                      title: 🚨 WAKE UP ALARM
                      message: Wake up! The bedroom speaker failed or is unavailable.
                      data:
                        channel: Voice_Alarm
                        ttl: 0
                        priority: high
                  - delay: "00:03:00"
                else:
                  - action: media_player.volume_set
                    target:
                      entity_id: media_player.home_assistant_voice_bedroom
                    data:
                      volume_level: 0.7
                  - action: input_text.set_value
                    target:
                      entity_id: input_text.active_alarm_media_bedroom
                    data:
                      value: media_player.home_assistant_voice_bedroom
                  - action: music_assistant.play_media
                    target:
                      entity_id: media_player.home_assistant_voice_bedroom
                    data:
                      enqueue: replace
                      media_id: >-
                        {% set playlist = [
                          'Yasunori Mitsuda - Peaceful Days',
                          'Bone Thugs-N-Harmony - First Of The Month',
                          'Enya - Caribbean Blue'
                        ] %}
                        {% set selected = playlist | random %}
                        {# We return the search query string for normal songs #}
                        {# We return the full http URL for the local fallback file #}
                        {{ selected if selected is not none else 'http://192.168.4.138:8123/local/sounds/peaceful_days.mp3' }}
                  - delay: "00:00:02"
                  - action: tts.speak
                    target:
                      entity_id: tts.openai
                    data:
                      media_player_entity_id: media_player.home_assistant_voice_bedroom
                      message: >-
                        Good Morning! Your alarm is going off. It is {{
                        now().strftime('%A, %B %-d %-I:%M %p') }}.
                  - delay: "00:03:00"
                  - action: media_player.media_stop
                    target:
                      entity_id: media_player.home_assistant_voice_bedroom
                    continue_on_error: true
                  - action: input_text.set_value
                    target:
                      entity_id: input_text.active_alarm_media_bedroom
                    data:
                      value: none
          - conditions:
              - condition: trigger
                id: playroom_alarm
              - condition: state
                entity_id: input_boolean.voice_alarm_enabled_playroom
                state: "on"
            sequence:
              - action: input_text.set_value
                target:
                  entity_id: input_text.active_alarm_media_playroom
                data:
                  value: media_player.arcade_soundbar
              - action: music_assistant.play_media
                data:
                  enqueue: replace
                  media_id: |-
                    {{ [
                      'Yasunori Mitsuda - Peaceful Days',
                      'Bone Thugs-N-Harmony - First Of The Month',
                      'Enya - Caribbean Blue'
                    ] | random }}
                target:
                  entity_id: media_player.arcade_soundbar
              - delay: "00:03:00"
              - action: media_player.media_stop
                continue_on_error: true
                data: {}
                target:
                  entity_id: media_player.arcade_soundbar
              - action: input_text.set_value
                target:
                  entity_id: input_text.active_alarm_media_playroom
                data:
                  value: none

  # ==========================================
  # VOICE COMMAND INTERCEPTION
  # ==========================================
  - alias: "Voice Command: Cancel Alarm"
    description: >-
      Intercepts exact phrases locally, determines the room context, sets the
      response, and fires the master cancel script.
    mode: single
    triggers:
      - trigger: conversation
        command:
          - cancel alarm
          - stop alarm
          - stop the alarm
          - cancel the alarm
          - turn off alarm
          - cancel my alarm
          - stop my alarm
          - turn off my alarm
          - turn off the alarm
    conditions: []
    actions:
      - variables:
          detected_area: "{{ area_id(trigger.device_id) if trigger.device_id else 'any' }}"
          target_room: |-
            {% if detected_area == 'bedroom' %}
              bedroom
            {% elif detected_area == 'playroom' %}
              playroom
            {% else %}
              any
            {% endif %}
          response_text: >-
            {% if states('input_text.active_alarm_media_bedroom') not in ['none',
            'unknown', ''] or states('input_text.active_alarm_media_playroom') not
            in ['none', 'unknown', ''] %}
              Done.
            {% elif target_room == 'bedroom' and
            is_state('input_boolean.voice_alarm_enabled_bedroom', 'on') %}
              Your alarm for {{ as_timestamp(today_at(states('input_datetime.voice_alarm_bedroom'))) | timestamp_custom('%-I:%M %p') }} in the bedroom is cancelled.
            {% elif target_room == 'playroom' and
            is_state('input_boolean.voice_alarm_enabled_playroom', 'on') %}
              Your alarm for {{ as_timestamp(today_at(states('input_datetime.voice_alarm_playroom'))) | timestamp_custom('%-I:%M %p') }} in the playroom is cancelled.
            {% elif target_room == 'any' and
            is_state('input_boolean.voice_alarm_enabled_bedroom', 'on') and
            is_state('input_boolean.voice_alarm_enabled_playroom', 'on') %}
              Your alarms for {{ as_timestamp(today_at(states('input_datetime.voice_alarm_bedroom'))) | timestamp_custom('%-I:%M %p') }} in the bedroom and {{ as_timestamp(today_at(states('input_datetime.voice_alarm_playroom'))) | timestamp_custom('%-I:%M %p') }} in the playroom are cancelled.
            {% else %}
              There are no scheduled alarms to cancel right now.
            {% endif %}
      - set_conversation_response: "{{ response_text }}"
      - action: script.cancel_active_alarms
        data:
          room: "{{ target_room }}"

script:
  # ==========================================
  # MASTER ALARM CANCELLATION SCRIPT
  # ==========================================
  cancel_active_alarms:
    alias: Cancel Active Alarms
    description: >-
      Safely stops ringing alarms or disables schedules and returns the action
      taken.
    mode: parallel
    fields:
      room:
        description: The target room (bedroom or playroom)
        example: bedroom
        default: any
    sequence:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ room == 'bedroom' }}"
            sequence:
              - if:
                  - condition: template
                    value_template: >-
                      {{ states('input_text.active_alarm_media_bedroom') not in
                      ['none', 'unknown', ''] }}
                then:
                  - action: automation.turn_off
                    target:
                      entity_id: automation.voice_alarm_notifications
                    data:
                      stop_actions: true
                  - action: automation.turn_on
                    target:
                      entity_id: automation.voice_alarm_notifications
                  - action: media_player.media_stop
                    target:
                      entity_id: "{{ states('input_text.active_alarm_media_bedroom') }}"
                    continue_on_error: true
                  - action: input_text.set_value
                    target:
                      entity_id: input_text.active_alarm_media_bedroom
                    data:
                      value: none
                  - variables:
                      action_result:
                        message: I silenced the bedroom speaker.
                  - stop: Halt and return
                    response_variable: action_result
                else:
                  - action: input_boolean.turn_off
                    target:
                      entity_id: input_boolean.voice_alarm_enabled_bedroom
                  - variables:
                      action_result:
                        message: I disabled the scheduled bedroom alarm.
                  - stop: Halt and return
                    response_variable: action_result
          - conditions:
              - condition: template
                value_template: "{{ room == 'playroom' }}"
            sequence:
              - if:
                  - condition: template
                    value_template: >-
                      {{ states('input_text.active_alarm_media_playroom') not in
                      ['none', 'unknown', ''] }}
                then:
                  - action: automation.turn_off
                    target:
                      entity_id: automation.voice_alarm_notifications
                    data:
                      stop_actions: true
                  - action: automation.turn_on
                    target:
                      entity_id: automation.voice_alarm_notifications
                  - action: media_player.media_stop
                    target:
                      entity_id: "{{ states('input_text.active_alarm_media_playroom') }}"
                    continue_on_error: true
                  - action: input_text.set_value
                    target:
                      entity_id: input_text.active_alarm_media_playroom
                    data:
                      value: none
                  - variables:
                      action_result:
                        message: I silenced the playroom speaker.
                  - stop: Halt and return
                    response_variable: action_result
                else:
                  - action: input_boolean.turn_off
                    target:
                      entity_id: input_boolean.voice_alarm_enabled_playroom
                  - variables:
                      action_result:
                        message: I disabled the scheduled playroom alarm.
                  - stop: Halt and return
                    response_variable: action_result
          - conditions:
              - condition: template
                value_template: "{{ room == 'any' }}"
            sequence:
              - if:
                  - condition: template
                    value_template: >-
                      {{ states('input_text.active_alarm_media_bedroom') not in
                      ['none', 'unknown', ''] }}
                then:
                  - action: media_player.media_stop
                    target:
                      entity_id: "{{ states('input_text.active_alarm_media_bedroom') }}"
                    continue_on_error: true
              - if:
                  - condition: template
                    value_template: >-
                      {{ states('input_text.active_alarm_media_playroom') not in
                      ['none', 'unknown', ''] }}
                then:
                  - action: media_player.media_stop
                    target:
                      entity_id: "{{ states('input_text.active_alarm_media_playroom') }}"
                    continue_on_error: true
              - action: input_text.set_value
                target:
                  entity_id:
                    - input_text.active_alarm_media_bedroom
                    - input_text.active_alarm_media_playroom
                data:
                  value: none
              - variables:
                  action_result:
                    message: I swept the house and stopped any ringing alarms.
              - stop: Halt and return
                response_variable: action_result