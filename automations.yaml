- id: '1751019768434'
  alias: Command Test
  description: ''
  trigger:
  - platform: conversation
    command:
    - load command
  condition: []
  action:
  - device_id: 4d115df6d13b937d21b8a89d0f471ca1
    domain: button
    entity_id: 7a38ea83699ce5323e78e37140960615
    type: press
    metadata:
      secondary: false
  - service: assist_satellite.announce
    data:
      message: loading command prompt
      preannounce: true
    target:
      area_id: bedroom
  mode: single

- id: 'bedroom_tv_renew_dev_mode_session'
  alias: "Bedroom TV: Renew Dev Mode Session"
  description: "Triggers on the 1st of the month when the TV turns on to renew the developer session token."
  trigger:
    - platform: state
      entity_id: media_player.bedroom_tv_lg
      to: "on"
  condition:
    - condition: template
      value_template: "{{ now().day == 1 }}"
  action:
    - service: homeassistant.update_entity
      target:
        entity_id: sensor.bedroom_tv_dev_mode_token
    - delay: "00:00:05"
    - service: rest_command.renew_lg_dev_mode
  mode: single
